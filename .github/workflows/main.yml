name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Рекомендую обновить до v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run SUT
        run: java -jar ./artifacts/app-replan-delivery.jar & # Убедитесь, что имя файла совпадает!
        
      - name: Wait for SUT to be ready
        run: |
          timeout 60s bash -c 'until curl -s localhost:9999; do sleep 2; done'
          echo "SUT is up and running!"

      - name: Run Tests
        run: ./gradlew test -Dselenide.headless=true -Dselenide.baseUrl=http://localhost:9999
